name: Delete old workflow runs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *" # Monthly at 00:00 on the 1st

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 30
          keep_minimum_runs: 6
          check_pullrequest_exist: true
